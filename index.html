<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZangTV — پەخشی ڕاستەوخۆی کەناڵە کوردییەکان</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #1e40af;
            --bg: #050510;
            --card-bg: #101025;
            --text: #ffffff;
            --muted: #94a3b8;
            --accent: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', 'Noto Sans Arabic', sans-serif; line-height: 1.6; }

        /* Navigation */
        nav { background: rgba(5, 5, 16, 0.95); backdrop-filter: blur(10px); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-menu { display: flex; gap: 15px; }
        .nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-weight: 600; transition: 0.3s; padding: 8px 12px; border-radius: 8px; }
        .nav-btn.active { color: #fff; background: rgba(139, 92, 246, 0.2); }

        /* Hero & Search */
        .hero { padding: 40px 5%; text-align: center; background: radial-gradient(circle at center, #1e1b4b 0%, #050510 100%); }
        .hero h1 { font-size: 2rem; margin-bottom: 15px; }
        .search-box { position: relative; max-width: 500px; margin: 0 auto; }
        .search-input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid var(--border); background: var(--card-bg); color: #fff; outline: none; font-size: 1rem; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }

        /* Categories */
        .cats { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .cat-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Grid */
        .container { padding: 20px 5%; max-width: 1200px; margin: 0 auto; }
        .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        /* Channel Card */
        .ch-card { background: var(--card-bg); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .ch-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .ch-img-box { height: 130px; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .ch-logo { width: 80px; height: 80px; object-fit: contain; }
        .ch-info { padding: 15px; text-align: center; }
        .ch-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 5px; }
        .ch-cat { font-size: 0.75rem; color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 5px; }
        
        .live-tag { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #fff; font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 5px; display: flex; align-items: center; gap: 4px; z-index: 10; }
        .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: pulse 1s infinite; }

        /* Player Modal */
        #player-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .modal-close { position: absolute; top: 25px; right: 25px; font-size: 2.5rem; color: #fff; cursor: pointer; }
        .video-wrapper { width: 95%; max-width: 900px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        
        /* Admin Section */
        .admin-box { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--border); margin-top: 20px; }
        .form-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: #fff; }
        .btn-action { background: var(--primary); color: #fff; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .ch-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .hero h1 { font-size: 1.5rem; }
            nav { padding: 0 15px; }
        }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="switchPage('home')">ZangTV</div>
    <div class="nav-menu">
        <button class="nav-btn active" id="nav-home" onclick="switchPage('home')">Home</button>
        <button class="nav-btn" id="nav-about" onclick="switchPage('about')">About</button>
        <button class="nav-btn" id="nav-admin" onclick="switchPage('admin')" style="color:var(--primary)">⚙️ Admin</button>
    </div>
</nav>

<!-- Page: Home -->

        <h1>هەموو کەناڵە کوردییەکان لە یەک شوێن</h1>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="ناونیشانی کەناڵ بنووسە..." oninput="search(this.value)">
        </div>
        <div class="cats">
            <button class="cat-btn active" onclick="filterCat('All', this)">هەمووی</button>
            <button class="cat-btn" onclick="filterCat('News', this)">هەواڵ</button>
            <button class="cat-btn" onclick="filterCat('Movies', this)">فیلم</button>
            <button class="cat-btn" onclick="filterCat('Kids', this)">منداڵان</button>
            <button class="cat-btn" onclick="filterCat('Music', this)">موزیک</button>
        </div>
    </div>

    <div class="container">
        <div class="ch-grid" id="main-grid"></div>
    </div>
</div>

<!-- Page: About -->
<div id="p-about" class="page">

        <h2>About ZangTV</h2>

        <div style="max-width: 400px; margin: 0 auto; text-align: left;">
            <a href="#" class="nav-btn" style="display: block; background: var(--card-bg); margin-bottom: 10px; border: 1px solid var(--border);">📸 Instagram: @ZangTV</a>
            <a href="#" class="nav-btn" style="display: block; background: var(--card-bg); border: 1px solid var(--border);">✈️ Telegram: t.me/ZangTV</a>
        </div>
    </div>
</div>
